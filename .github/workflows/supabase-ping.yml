name: Supabase Ping

on:
  schedule:
    # Run every Monday and Thursday at UTC 00:00
    - cron: '0 0 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database (UPSERT)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          BODY=$(curl -s -w "\n%{http_code}" \
            "${SUPABASE_URL}/rest/v1/keepalive" \
            -X POST \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates,return=minimal" \
            -d "[{\"id\": 1, \"pinged_at\": \"$(date -u +"%Y-%m-%dT%H:%M:%SZ")\"}]")

          RESPONSE=$(echo "$BODY" | tail -1)
          CONTENT=$(echo "$BODY" | head -n -1)

          if [ "$RESPONSE" -lt 200 ] || [ "$RESPONSE" -ge 300 ]; then
            echo "::error::Supabase ping failed with HTTP status: $RESPONSE"
            echo "Response body: $CONTENT"
            exit 1
          fi

          echo "Supabase ping successful (HTTP $RESPONSE)"
